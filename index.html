<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>TASKAFÉ Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-512.png.PNG" />
  <link rel="apple-touch-icon" href="icon-512.png.PNG" />
  <meta name="theme-color" content="#000000" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="splashScreen">
    <div class="splash-logo-wrap">
      <img src="icon-512.png.PNG" alt="TASKAFÉ" />
      <div class="splash-shine"></div>
    </div>
  </div>
  <script>
    (function() {
      var dark = localStorage.getItem('darkMode') === 'true';
      if (dark) {
        document.body.classList.add('dark');
        document.documentElement.classList.add('dark');
        document.body.style.backgroundColor = '#0f0f0f';
        document.documentElement.style.backgroundColor = '#0f0f0f';
      } else {
        document.documentElement.style.backgroundColor = '#f4efe8';
        document.body.style.backgroundColor = '#f4efe8';
        var s = document.getElementById('splashScreen');
        if (s) s.classList.add('splash-light');
      }
      // Safety fallback: if the module script fails to run (e.g. a SyntaxError
      // or a failed ESM import), the splash timer inside the module never fires
      // and the user is stuck on the splash indefinitely.  This plain-script
      // guard forces the splash off after SPLASH_SAFETY_MS so the login screen
      // is always reachable even when the module cannot start normally.
      var SPLASH_SAFETY_MS = 8000;
      setTimeout(function() {
        var splash = document.getElementById('splashScreen');
        if (splash) {
          splash.classList.add('splash-done');
          setTimeout(function() {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 750);
        }
      }, SPLASH_SAFETY_MS);
    })();
  </script>
  <div id="offlineBanner" class="offline-banner" style="display:none;">
    <span id="offlineBannerText">📶 Hors ligne&ensp;</span><span id="offlinePendingCount"></span>
  </div>
  <div id="sessionStatus" class="session-status"></div>
  <div id="pullIndicator">
    <svg class="ptr-svg" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
      <circle class="ptr-track" cx="22" cy="22" r="16"/>
      <circle class="ptr-arc" id="pullArc" cx="22" cy="22" r="16" transform="rotate(-90 22 22)"/>
    </svg>
  </div>

  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="logo-wrap">
          <img src="icon-512.png.PNG" alt="TASKAFÉ" />
          <div class="logo-shine"></div>
        </div>
        <h1>TASKAFÉ</h1>
        <p>Gestion de ventes cloud sécurisée</p>
      </div>

      <input id="loginEmail" type="email" placeholder="Email" autocomplete="username"
             autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="email" />

      <input id="loginPassword" type="password" placeholder="Mot de passe" autocomplete="current-password"
             autocapitalize="none" autocorrect="off" spellcheck="false" />

      <div class="checkbox-line">
        <input id="rememberSession" type="checkbox" checked />
        <label for="rememberSession" style="margin: 0; flex: 1;">Rester connecté</label>
      </div>

      <button id="loginBtn" type="button">Se connecter</button>
      <div id="authError" class="auth-error"></div>
    </div>
  </div>

  <div id="appShell" class="hidden">
    <header class="banner-header">
      <div class="banner-visual" role="banner" aria-label="TASKAFÉ">
        <div class="banner-logo-wrap">
          <img src="icon-512.png.PNG" alt="" class="banner-logo-img" aria-hidden="true" />
          <div class="banner-logo-shine"></div>
        </div>
        <div class="banner-text">
          <span class="banner-title">TASKAFÉ</span>
          <span class="banner-sub">Gestion · Suivi · Stock</span>
        </div>
        <div class="banner-shimmer" aria-hidden="true"></div>
      </div>
      <div class="header-menu-wrap">
        <button class="header-menu-btn" onclick="toggleHeaderMenu(event)">⋯</button>
        <div class="header-menu" id="headerMenu">
          <div class="user-chip">
            <strong id="menuUserName">—</strong>
            <span id="menuUserRole">—</span>
          </div>
          <button onclick="openProfileModal()">👤 Mon profil</button>
          <button onclick="openSettingsHubModal()">⚙️ Paramètres</button>
          <button id="darkModeBtn" onclick="toggleDarkMode()">🌙 Mode sombre</button>
          <button id="productPricesBtn" onclick="openProductPricesModal()" class="hidden">💲 Prix produits</button>
          <button id="analyticsBtn" onclick="openAnalyticsModal()" class="hidden">📈 Analytiques</button>
          <button onclick="openResumeModal()">📊 Résumé rapide</button>
          <button id="usersBtn" onclick="openUsersModal()" class="hidden">👥 Gérer utilisateurs</button>
          <button id="resetAppBtn" class="hidden" onclick="openResetModal()">🔄 Réinitialiser filtres</button>
          <button id="logsBtnMenu" class="hidden" onclick="showLogsSection()">📋 Logs</button>
          <button id="permissionsBtn" class="hidden" onclick="openPermissionsModal()">🔐 Droits d'accès</button>
          <button onclick="logout()">🚪 Déconnexion</button>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="top-actions">
        <button id="btnSales" class="tab-btn active" onclick="show('sales')">💰 Ventes</button>
        <button id="btnClients" class="tab-btn" onclick="show('clients')">👥 Clients</button>
        <button id="btnStock" class="tab-btn" onclick="show('stock')">📦 Stock <span id="stockAlert" class="tab-badge"></span></button>
        <button id="btnBalance" class="tab-btn" onclick="show('balance')">⚖️ Balance</button>
      </div>

      <div id="sales" class="section-shell">
        <h3>💵 Nouvelle vente</h3>

        <label>Sélectionner un client</label>
        <div class="client-search-wrap" id="clientSelectWrap">
          <input id="clientSelectSearch" type="text" placeholder="🔎 Rechercher un client..." autocomplete="off" oninput="onClientSelectInput()" onfocus="showClientSelectDrop()" />
          <input type="hidden" id="clientSelect" />
          <div class="client-search-drop" id="clientSelectDrop"></div>
        </div>

        <label for="quantityInput">Quantité</label>
        <input id="quantityInput" type="number" step="0.01" placeholder="Quantité" oninput="updatePreview()" />

        <label for="category">Catégorie</label>
        <select id="category" onchange="updateCategoryStyle(); updatePreview(); updateQuantityPlaceholder();"></select>

        <div class="date-field">
          <label for="datetime">📅 Date & Heure</label>
          <div class="date-actions">
            <input type="datetime-local" id="datetime" />
            <button type="button" class="small-btn" onclick="setNow()">Maintenant</button>
          </div>
        </div>

        <div class="payment-status-row">
          <label class="payment-toggle" id="labelPaid">
            <input type="radio" name="paymentStatus" id="paid" value="paid" onchange="updatePaymentToggle()" />
            <span class="payment-toggle-inner">✅ Payé</span>
          </label>
          <label class="payment-toggle" id="labelNotPaid">
            <input type="radio" name="paymentStatus" id="notPaid" value="notpaid" onchange="updatePaymentToggle()" />
            <span class="payment-toggle-inner">❌ Non payé</span>
          </label>
        </div>

        <div class="preview-bar">
          <div class="preview-chip"><span class="pchip-label">Prix unit.</span><span class="pchip-val" id="previewUnitPrice">0 DHS</span></div>
          <div class="preview-chip preview-chip--total"><span class="pchip-label">Total</span><span class="pchip-val" id="previewTotalPrice">0 DHS</span></div>
          <div class="preview-chip"><span class="pchip-label">Client</span><span class="pchip-val" id="previewClientName">—</span></div>
        </div>

        <div style="display:flex;justify-content:center;">
          <button class="add-sale-btn" onclick="addSale()">🛒 Valider la commande</button>
        </div>

        <hr />

        <div class="accordion vr-acc open" id="ventesRecentesAcc">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>📊 Ventes récentes</span>
            <span class="arrow">▼</span>
          </div>
          <div class="accordion-inner">
            <div class="sales-scroll-area" id="salesScrollArea">
              <div class="vr-cards-list" id="vrClientCards"></div>
              <div id="vrClientDetail" style="display:none;">
                <div class="vr-detail-header">
                  <button class="vr-back-btn" onclick="closeClientSales()" aria-label="Retour à la liste des clients">‹</button>
                  <span class="vr-detail-title" id="vrDetailTitle"></span>
                </div>
                <div id="salesList"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="accordion">
          <div class="accordion-header" onclick="toggleAccordion(this)"><span>🔍 Filtres</span><span class="arrow">▼</span></div>
          <div class="accordion-inner">
            <label>Client</label>
            <div class="client-search-wrap" id="clientSearchWrap">
              <input id="filterClientSearch" type="text" placeholder="Rechercher un client…" autocomplete="off" oninput="onFilterClientInput()" onfocus="showClientDropdown()" />
              <input type="hidden" id="filterClient" />
              <div class="client-search-drop" id="clientSearchDrop"></div>
            </div>

            <label for="filterDate">📅 Date</label>
            <input type="date" id="filterDate" onchange="renderSales()" />

            <details style="margin-top:10px;">
              <summary style="font-size:12px;font-weight:700;color:var(--color-text-muted);cursor:pointer;text-transform:uppercase;letter-spacing:0.3px;">▸ Filtre catégorie</summary>
              <select id="filterCategory" onchange="renderSales()" style="margin-top:8px;"><option value="">Toutes catégories</option></select>
            </details>
          </div>
        </div>
      </div>

      <div id="clients" class="section-shell hidden">

        <div class="nouveau-client-panel">
          <div class="ncp-header">➕ Nouveau client</div>
          <div class="ncp-body">
            <div class="ncp-field">
              <label for="clientName">Nom du client</label>
              <input id="clientName" type="text" placeholder="Nom du client" />
            </div>

            <div class="ncp-num-type-row">
              <div class="ncp-field">
                <label for="clientAddrNum">Numéro</label>
                <input id="clientAddrNum" type="text" placeholder="N°" />
              </div>
              <div class="ncp-field">
                <label for="clientAddrType">Type de voie</label>
                <select id="clientAddrType">
                  <option value="Rue">Rue</option><option value="Avenue">Avenue</option><option value="Boulevard">Boulevard</option><option value="Impasse">Impasse</option><option value="Chemin">[...]
