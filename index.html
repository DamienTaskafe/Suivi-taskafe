<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>TASKAFÉ</title>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-512.png.PNG" />
  <link rel="apple-touch-icon" href="icon-512.png.PNG" />
  <meta name="theme-color" content="#000000" />

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4efe8;
      color: #1b1b1b;
      -webkit-user-select: none;
      user-select: none;
      min-height: 100vh;
    }

    input, select, textarea {
      -webkit-user-select: text;
      user-select: text;
      font-size: 16px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("icon-512.png.PNG") center center / cover no-repeat;
      opacity: 0.16;
      filter: blur(1px);
      transform: scale(1.03);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.16));
      z-index: -1;
    }

    /* SPLASH */
    #splash {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, #232323 0%, #000000 72%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      color: white;
    }

    .logo-wrap {
      position: relative;
      width: 270px;
      height: 270px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0;
      border-radius: 50%;
      overflow: hidden;
      background: #000;
    }

    .logo-wrap img {
      width: 140%;
      height: 140%;
      object-fit: cover;
      border-radius: 50%;
      opacity: 0;
      transform: scale(0.8);
      animation: appearZoom 1.6s ease-out forwards;
      display: block;
      box-shadow: none;
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(255,255,255,0) 0deg,
        rgba(255,255,255,0.12) 55deg,
        rgba(255,255,255,0.72) 120deg,
        rgba(255,255,255,0.12) 190deg,
        rgba(255,255,255,0) 360deg
      );
      filter: blur(8px);
      opacity: 1;
      animation: spinOnce 1.6s linear forwards;
      transform: scale(1.03);
      pointer-events: none;
    }

    @keyframes appearZoom {
      0% { opacity: 0; transform: scale(0.74); }
      60% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes spinOnce {
      0% { transform: scale(1.03) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: scale(1.03) rotate(360deg); opacity: 0; }
    }

    /* HEADER */
    header.banner-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.88);
      padding: 0;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
      backdrop-filter: blur(8px);
    }

    .header-banner {
      display: block;
      width: 100%;
      height: auto;
      max-height: 112px;
      object-fit: cover;
    }

    .header-menu-wrap {
      position: absolute;
      right: 12px;
      top: 12px;
    }

    .header-menu-btn {
      background: rgba(0,0,0,0.52);
      border: 1px solid rgba(255,255,255,0.16);
      color: white;
      font-size: 28px;
      width: auto;
      margin: 0;
      padding: 2px 10px;
      cursor: pointer;
      border-radius: 14px;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    .header-menu {
      display: none;
      position: absolute;
      right: 0;
      top: 42px;
      background: rgba(255,255,255,0.97);
      border-radius: 14px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.20);
      overflow: hidden;
      min-width: 230px;
      border: 1px solid rgba(0,0,0,0.06);
    }

    .header-menu button {
      width: 100%;
      margin: 0;
      border-radius: 0;
      background: transparent;
      color: #111;
      text-align: left;
      padding: 13px 14px;
      font-weight: 600;
      box-shadow: none;
    }

    .header-menu button:hover {
      background: rgba(0,0,0,0.05);
      transform: none;
    }

    /* LAYOUT */
    .container {
      width: 100%;
      max-width: 780px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 34px;
    }

    .top-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-shell {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 22px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.10);
    }

    /* BUTTONS */
    button {
      width: 100%;
      padding: 12px 14px;
      margin: 5px 0;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #181818 0%, #000000 100%);
      color: white;
      cursor: pointer;
      box-shadow:
        0 8px 16px rgba(0,0,0,0.14),
        inset 0 1px 0 rgba(255,255,255,0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    button:hover {
      opacity: 1;
      transform: translateY(-1px);
      box-shadow:
        0 10px 18px rgba(0,0,0,0.16),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .tab-btn {
      position: relative;
      overflow: hidden;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 15px;
    }

    .tab-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(255,255,255,0.12),
        rgba(255,255,255,0.02) 40%,
        rgba(255,255,255,0.12)
      );
      opacity: 0.5;
      pointer-events: none;
    }

    .tab-btn.active {
      background: linear-gradient(180deg, #2a2a2a 0%, #101010 100%);
      box-shadow:
        0 12px 22px rgba(0,0,0,0.16),
        inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    /* FIELDS */
    input, select {
      width: 100%;
      padding: 13px 14px;
      margin: 6px 0;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.94);
      outline: none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.6),
        0 4px 12px rgba(0,0,0,0.04);
      color: #171717;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    input:focus, select:focus {
      border-color: rgba(0,0,0,0.18);
      box-shadow:
        0 0 0 3px rgba(0,0,0,0.05),
        0 8px 16px rgba(0,0,0,0.06);
      transform: translateY(-1px);
    }

    label {
      display: block;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #443932;
    }

    hr {
      border: none;
      border-top: 1px solid rgba(0,0,0,0.12);
      margin: 18px 0;
    }

    h3 {
      margin: 8px 0 12px;
      font-size: 20px;
      color: #191919;
      font-family: "Playfair Display", serif;
      letter-spacing: 0.3px;
    }

    h4 {
      margin: 10px 0 8px;
      font-size: 15px;
      color: #40342d;
    }

    .hidden {
      display: none;
    }

    /* DATE */
    .date-field {
      margin: 8px 0 10px;
    }

    .date-field label {
      display: block;
      font-size: 14px;
      color: #4d433c;
      margin-bottom: 6px;
      font-weight: 700;
    }

    ..date-actions {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 145px;
  gap: 8px;
  align-items: stretch;
  width: 100%;
}

.date-actions input,
#filterDate {
  width: 100%;
  min-width: 0;
  max-width: 100%;
  margin: 0;
  display: block;
  -webkit-appearance: none;
  appearance: none;
  height: 52px;
  padding: 13px 14px;
  border-radius: 14px;
}

.small-btn {
  width: 145px;
  white-space: nowrap;
  height: 52px;
  padding: 0 14px;
  margin: 0;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

    /* CARD */
    .card {
      background: rgba(255, 249, 243, 0.96);
      padding: 18px;
      margin-bottom: 14px;
      border-radius: 20px;
      min-height: 116px;
      box-shadow:
        0 10px 22px rgba(0,0,0,0.08),
        0 4px 8px rgba(0,0,0,0.05);
      transition: all 0.22s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.55);
      opacity: 0;
      transform: translateY(14px);
      animation: cardIn 0.35s ease forwards;
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 16px 28px rgba(0,0,0,0.12),
        0 8px 12px rgba(0,0,0,0.06);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -50%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255,255,255,0.30),
        transparent
      );
      transform: skewX(-20deg);
      transition: 0.6s;
    }

    .card:hover::before {
      left: 120%;
    }

    .card-title {
      display: block;
      margin-right: 40px;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 7px;
      color: #171717;
    }

    .line {
      line-height: 1.75;
      font-size: 14px;
      color: #3b332e;
    }

    /* MENUS */
    .menu-wrap {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    .menu-btn {
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(0,0,0,0.06);
      font-size: 22px;
      color: #333;
      cursor: pointer;
      width: auto;
      margin: 0;
      padding: 0 8px;
      border-radius: 12px;
      box-shadow: none;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .menu-btn:hover {
      transform: none;
      background: rgba(255,255,255,0.74);
    }

    .menu {
      display: none;
      position: absolute;
      top: 34px;
      right: 0;
      background: rgba(255,255,255,0.98);
      border-radius: 14px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.16);
      overflow: hidden;
      z-index: 100;
      min-width: 190px;
      border: 1px solid rgba(0,0,0,0.06);
    }

    .menu button {
      width: 100%;
      padding: 11px 12px;
      border: none;
      background: transparent;
      color: #111;
      text-align: left;
      margin: 0;
      border-radius: 0;
      box-shadow: none;
      font-weight: 600;
    }

    .menu button:hover {
      background: rgba(0,0,0,0.05);
      transform: none;
    }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 8px 13px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.45px;
      margin-bottom: 8px;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.28);
      background-image:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.40) 0%,
          rgba(255,255,255,0.12) 28%,
          rgba(192,192,192,0.18) 50%,
          rgba(255,255,255,0.04) 72%,
          rgba(255,255,255,0.18) 100%
        );
      background-blend-mode: screen;
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.22),
        0 2px 6px rgba(0,0,0,0.16);
      color: white;
    }

    .badge.ORO { background-color: #f39a1e; color: white; }
    .badge.RIO { background-color: #1f78ff; color: white; }
    .badge.ESPRESSO { background-color: #d52a2a; color: white; }
    .badge.CLASSIC { background-color: #6b4329; color: #f4d27a; }
    .badge.SANTOS { background-color: #161616; color: #d4af37; }
    .badge.SUCRE { background-color: #e6d3a3; color: black; }

    /* CATEGORY SELECT */
    #category {
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.25);
      background-image:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.38) 0%,
          rgba(255,255,255,0.12) 28%,
          rgba(192,192,192,0.18) 50%,
          rgba(255,255,255,0.04) 72%,
          rgba(255,255,255,0.18) 100%
        );
      background-blend-mode: screen;
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.22),
        0 2px 6px rgba(0,0,0,0.16);
      color: white;
    }

    #category.ORO { background-color: #f39a1e; color: white; }
    #category.RIO { background-color: #1f78ff; color: white; }
    #category.ESPRESSO { background-color: #d52a2a; color: white; }
    #category.CLASSIC { background-color: #6b4329; color: #f4d27a; }
    #category.SANTOS { background-color: #161616; color: #d4af37; }
    #category.SUCRE { background-color: #e6d3a3; color: black; }

    #category option[value="ORO"] { background: #f39a1e; color: white; }
    #category option[value="RIO"] { background: #1f78ff; color: white; }
    #category option[value="ESPRESSO"] { background: #d52a2a; color: white; }
    #category option[value="CLASSIC"] { background: #6b4329; color: #f4d27a; }
    #category option[value="SANTOS"] { background: #161616; color: #d4af37; }
    #category option[value="SUCRE"] { background: #e6d3a3; color: black; }

    .paid {
      color: #148c37;
      font-weight: bold;
    }

    .unpaid {
      color: #cc2d2d;
      font-weight: bold;
    }

    .checkbox-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 700;
    }

    .checkbox-line input {
      width: auto;
      margin: 0;
      transform: scale(1.1);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .summary-box {
      background: rgba(252, 246, 239, 0.96);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.55);
      position: relative;
      overflow: hidden;
    }

    .summary-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.22),
        rgba(255,255,255,0.02) 40%,
        rgba(255,255,255,0.18)
      );
      pointer-events: none;
    }

    .summary-box .label {
      position: relative;
      font-size: 12px;
      opacity: 0.72;
      margin-bottom: 6px;
      text-transform: uppercase;
      color: #5f524b;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .summary-box .value {
      position: relative;
      font-size: 19px;
      font-weight: 700;
      color: #171717;
    }

    .prices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
    }

    .prices-grid input {
      margin: 0;
    }

    .hint {
      font-size: 12px;
      color: #6b5d55;
      margin-top: 6px;
    }

    @media (max-width: 640px) {
      .summary-grid,
      .prices-grid,
      .top-actions {
        grid-template-columns: 1fr;
      }

      .date-actions {
        grid-template-columns: 1fr;
        width: 100%;
      }

      .date-actions input,
      #filterDate,
      .small-btn {
        width: 100%;
        max-width: 100%;
      }

      .logo-wrap {
        width: 220px;
        height: 220px;
      }

      .header-banner {
        max-height: 90px;
      }

      .container {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <div id="splash">
    <div class="logo-wrap">
      <img src="icon-512.png.PNG" alt="TASKAFÉ" />
    </div>
  </div>

  <header class="banner-header">
    <img src="IMG_5089.jpeg" alt="TASKAFÉ" class="header-banner" />

    <div class="header-menu-wrap">
      <button class="header-menu-btn" onclick="toggleHeaderMenu(event)">⋯</button>
      <div class="header-menu" id="headerMenu">
        <button onclick="confirmResetFilters()">Réinitialiser les filtres</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="top-actions">
      <button id="btnSales" class="tab-btn active" onclick="show('sales')">Ventes</button>
      <button id="btnClients" class="tab-btn" onclick="show('clients')">Clients</button>
    </div>

    <div id="sales" class="section-shell">
      <h3>Nouvelle vente</h3>

      <select id="clientSelect"></select>

      <input id="kilos" type="number" placeholder="Kilos" />

      <select id="category" onchange="updateCategoryStyle(); previewPrice();">
        <option value="ORO">ORO</option>
        <option value="RIO">RIO</option>
        <option value="ESPRESSO">ESPRESSO</option>
        <option value="CLASSIC">CLASSIC</option>
        <option value="SANTOS">SANTOS</option>
        <option value="SUCRE">SUCRE</option>
      </select>

      <div class="date-field">
        <label for="datetime">📅 Choisir votre date</label>
        <div class="date-actions">
          <input type="datetime-local" id="datetime" />
          <button type="button" class="small-btn" onclick="setNow()">Aujourd’hui</button>
        </div>
      </div>

      <label class="checkbox-line">
        <input type="checkbox" id="paid" />
        <span>Payé</span>
      </label>

      <div class="summary-grid">
        <div class="summary-box">
          <div class="label">Prix unitaire</div>
          <div class="value" id="previewUnitPrice">0 DH</div>
        </div>
        <div class="summary-box">
          <div class="label">Total commande</div>
          <div class="value" id="previewTotalPrice">0 DH</div>
        </div>
        <div class="summary-box">
          <div class="label">Client</div>
          <div class="value" id="previewClientName">—</div>
        </div>
      </div>

      <button onclick="addSale()">Ajouter vente</button>

      <hr />

      <h3>Filtres</h3>

      <select id="filterClient" onchange="render()"></select>

      <select id="filterCategory" onchange="render()">
        <option value="">Toutes catégories</option>
        <option value="ORO">ORO</option>
        <option value="RIO">RIO</option>
        <option value="ESPRESSO">ESPRESSO</option>
        <option value="CLASSIC">CLASSIC</option>
        <option value="SANTOS">SANTOS</option>
        <option value="SUCRE">SUCRE</option>
      </select>

      <input type="date" id="filterDate" onchange="render()" />

      <hr />

      <h3>Ventes</h3>
      <div id="list"></div>

      <div class="summary-grid">
        <div class="summary-box">
          <div class="label">Total kilos</div>
          <div class="value" id="total">0</div>
        </div>
        <div class="summary-box">
          <div class="label">Total DH</div>
          <div class="value" id="totalDh">0 DH</div>
        </div>
        <div class="summary-box">
          <div class="label">Non payé</div>
          <div class="value" id="unpaidDh">0 DH</div>
        </div>
      </div>
    </div>

    <div id="clients" class="section-shell hidden">
      <h3>Nouveau client</h3>

      <input id="clientName" placeholder="Nom client" />
      <input id="clientAddress" placeholder="Adresse" />
      <input id="clientICE" placeholder="ICE" />

      <h4>Prix personnalisés client (facultatif)</h4>
      <div class="prices-grid">
        <input id="priceORO" type="number" placeholder="ORO (130 par défaut)" />
        <input id="priceRIO" type="number" placeholder="RIO (135 par défaut)" />
        <input id="priceESPRESSO" type="number" placeholder="ESPRESSO (140 par défaut)" />
        <input id="priceCLASSIC" type="number" placeholder="CLASSIC (150 par défaut)" />
        <input id="priceSANTOS" type="number" placeholder="SANTOS (180 par défaut)" />
        <input id="priceSUCRE" type="number" placeholder="SUCRE (100 par défaut)" />
      </div>
      <div class="hint">Laisse vide pour utiliser automatiquement le prix de base.</div>

      <button onclick="addClient()">Ajouter client</button>

      <hr />

      <h3>Liste clients</h3>
      <div id="clientList"></div>
    </div>
  </div>

  <script>
    const BASE_PRICES = {
      ORO: 130,
      RIO: 135,
      ESPRESSO: 140,
      CLASSIC: 150,
      SANTOS: 180,
      SUCRE: 100
    };

    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
    }, 2000);

    const state = {
      sales: JSON.parse(localStorage.getItem("sales") || "[]"),
      clients: JSON.parse(localStorage.getItem("clients") || "[]")
    };

    function save() {
      localStorage.setItem("sales", JSON.stringify(state.sales));
      localStorage.setItem("clients", JSON.stringify(state.clients));
    }

    function show(tab) {
      document.getElementById("sales").classList.add("hidden");
      document.getElementById("clients").classList.add("hidden");
      document.getElementById("btnSales").classList.remove("active");
      document.getElementById("btnClients").classList.remove("active");

      document.getElementById(tab).classList.remove("hidden");
      document.getElementById(tab === "sales" ? "btnSales" : "btnClients").classList.add("active");
      closeAllMenus();
    }

    function normalizeClient(rawClient) {
      if (!rawClient.prices) rawClient.prices = {};
      return rawClient;
    }

    state.clients = state.clients.map(normalizeClient);

    function getClientByName(name) {
      return state.clients.find(c => c.name === name);
    }

    function getClientPrice(clientName, category) {
      const client = getClientByName(clientName);
      if (!client || !client.prices) return BASE_PRICES[category] || 0;

      const customPrice = client.prices[category];
      if (customPrice === "" || customPrice === null || customPrice === undefined || Number(customPrice) <= 0) {
        return BASE_PRICES[category] || 0;
      }

      return Number(customPrice);
    }

    function readCustomPrice(id) {
      const value = document.getElementById(id).value;
      if (value === "") return "";
      const n = Number(value);
      return isNaN(n) || n <= 0 ? "" : n;
    }

    function addClient() {
      const name = document.getElementById("clientName").value.trim();
      const address = document.getElementById("clientAddress").value.trim();
      const ice = document.getElementById("clientICE").value.trim();

      if (!name) {
        alert("❌ Nom client obligatoire");
        return;
      }

      if (state.clients.some(c => c.name.toLowerCase() === name.toLowerCase())) {
        alert("❌ Client déjà existant");
        return;
      }

      const client = {
        name,
        address,
        ice,
        prices: {
          ORO: readCustomPrice("priceORO"),
          RIO: readCustomPrice("priceRIO"),
          ESPRESSO: readCustomPrice("priceESPRESSO"),
          CLASSIC: readCustomPrice("priceCLASSIC"),
          SANTOS: readCustomPrice("priceSANTOS"),
          SUCRE: readCustomPrice("priceSUCRE")
        }
      };

      state.clients.push(client);
      save();

      document.getElementById("clientName").value = "";
      document.getElementById("clientAddress").value = "";
      document.getElementById("clientICE").value = "";
      document.getElementById("priceORO").value = "";
      document.getElementById("priceRIO").value = "";
      document.getElementById("priceESPRESSO").value = "";
      document.getElementById("priceCLASSIC").value = "";
      document.getElementById("priceSANTOS").value = "";
      document.getElementById("priceSUCRE").value = "";

      loadClients();
      renderClients();
      previewPrice();
    }

    function confirmDeleteClient(index) {
      const client = state.clients[index];
      const ok = confirm(`Voulez-vous vraiment supprimer le client "${client.name}" et toutes ses commandes ?`);
      if (!ok) return;
      deleteClient(index);
    }

    function deleteClient(index) {
      const clientName = state.clients[index].name;
      state.clients.splice(index, 1);
      state.sales = state.sales.filter(s => s.client !== clientName);
      save();
      loadClients();
      renderClients();
      render();
      previewPrice();
    }

    function loadClients() {
      const sel = document.getElementById("clientSelect");
      const fil = document.getElementById("filterClient");

      sel.innerHTML = "";
      fil.innerHTML = "<option value=''>Tous clients</option>";

      state.clients.forEach(c => {
        const safeName = escapeHtml(c.name);
        sel.innerHTML += `<option value="${safeName}">${safeName}</option>`;
        fil.innerHTML += `<option value="${safeName}">${safeName}</option>`;
      });
    }

    function renderClients() {
      const list = document.getElementById("clientList");
      let html = "";

      state.clients.forEach((c, i) => {
        html += `
          <div class="card">
            <div class="menu-wrap">
              <button class="menu-btn" onclick="toggleMenu(event, 'c${i}')">⋯</button>
              <div class="menu" id="c${i}">
                <button onclick="confirmDeleteClient(${i})">Supprimer</button>
              </div>
            </div>

            <span class="card-title">${escapeHtml(c.name)}</span>
            <div class="line">
              ${c.address ? `${escapeHtml(c.address)}<br>` : ""}
              ICE: ${escapeHtml(c.ice || "")}<br>
              ORO: ${c.prices.ORO || BASE_PRICES.ORO} DH |
              RIO: ${c.prices.RIO || BASE_PRICES.RIO} DH<br>
              ESPRESSO: ${c.prices.ESPRESSO || BASE_PRICES.ESPRESSO} DH |
              CLASSIC: ${c.prices.CLASSIC || BASE_PRICES.CLASSIC} DH<br>
              SANTOS: ${c.prices.SANTOS || BASE_PRICES.SANTOS} DH |
              SUCRE: ${c.prices.SUCRE || BASE_PRICES.SUCRE} DH
            </div>
          </div>
        `;
      });

      list.innerHTML = html;
    }

    function addSale() {
      const client = document.getElementById("clientSelect").value;
      const kilos = parseFloat(document.getElementById("kilos").value);
      const category = document.getElementById("category").value;
      const rawDate = document.getElementById("datetime").value;
      const datetime = rawDate ? new Date(rawDate).toISOString() : new Date().toISOString();
      const paid = document.getElementById("paid").checked;

      if (!client) {
        alert("❌ Choisir un client");
        return;
      }

      if (isNaN(kilos) || kilos <= 0) {
        alert("❌ Kilos invalides");
        return;
      }

      if (!category) {
        alert("❌ Choisir une catégorie");
        return;
      }

      const unitPrice = getClientPrice(client, category);
      const totalPrice = Number((kilos * unitPrice).toFixed(2));

      state.sales.push({
        client,
        kilos,
        category,
        unitPrice,
        totalPrice,
        datetime,
        paid
      });

      save();

      document.getElementById("kilos").value = "";
      document.getElementById("datetime").value = "";
      document.getElementById("paid").checked = false;

      render();
      previewPrice();
    }

    function confirmDeleteSale(index) {
      const ok = confirm("Voulez-vous vraiment supprimer cette commande ?");
      if (!ok) return;
      deleteSale(index);
    }

    function deleteSale(index) {
      state.sales.splice(index, 1);
      save();
      render();
      previewPrice();
    }

    function confirmTogglePaid(index) {
      const sale = state.sales[index];
      const message = sale.paid
        ? "Voulez-vous vraiment passer cette commande en NON PAYÉ ?"
        : "Voulez-vous vraiment passer cette commande en PAYÉ ?";

      const ok = confirm(message);
      if (!ok) return;

      togglePaid(index);
    }

    function togglePaid(index) {
      state.sales[index].paid = !state.sales[index].paid;
      save();
      render();
    }

    function getFiltered() {
      const c = document.getElementById("filterClient").value;
      const cat = document.getElementById("filterCategory").value;
      const date = document.getElementById("filterDate").value;

      return state.sales.filter(s =>
        (!c || s.client === c) &&
        (!cat || s.category === cat) &&
        (!date || new Date(s.datetime).toISOString().slice(0, 10) === date)
      );
    }

    function render() {
      const list = document.getElementById("list");
      let html = "";
      let totalKilos = 0;
      let totalDh = 0;
      let unpaidDh = 0;

      const data = getFiltered();

      data.forEach((s, idx) => {
        const realIndex = state.sales.indexOf(s);
        totalKilos += Number(s.kilos);
        totalDh += Number(s.totalPrice || 0);
        if (!s.paid) unpaidDh += Number(s.totalPrice || 0);

        html += `
          <div class="card" style="animation-delay:${idx * 0.04}s">
            <div class="menu-wrap">
              <button class="menu-btn" onclick="toggleMenu(event, 's${realIndex}')">⋯</button>
              <div class="menu" id="s${realIndex}">
                <button onclick="confirmTogglePaid(${realIndex})">
                  ${s.paid ? 'Passer en NON PAYÉ' : 'Passer en PAYÉ'}
                </button>
                <button onclick="confirmDeleteSale(${realIndex})">Supprimer</button>
              </div>
            </div>

            <span class="card-title">${escapeHtml(s.client)}</span>
            <span class="badge ${escapeHtml(s.category)}">${escapeHtml(s.category)}</span>
            <div class="line">
              ${s.kilos} kg<br>
              ${Number(s.unitPrice || 0)} DH/kg<br>
              <strong>${formatDh(s.totalPrice || 0)}</strong><br>
              ${new Date(s.datetime).toLocaleString()}<br>
              ${s.paid ? '<span class="paid">PAYÉ</span>' : '<span class="unpaid">NON PAYÉ</span>'}
            </div>
          </div>
        `;
      });

      list.innerHTML = html;
      document.getElementById("total").innerText = totalKilos;
      document.getElementById("totalDh").innerText = formatDh(totalDh);
      document.getElementById("unpaidDh").innerText = formatDh(unpaidDh);
    }

    function confirmResetFilters() {
      closeAllMenus();
      const ok = confirm("Voulez-vous vraiment réinitialiser les filtres ?");
      if (!ok) return;
      resetFilters();
    }

    function resetFilters() {
      document.getElementById("filterClient").value = "";
      document.getElementById("filterCategory").value = "";
      document.getElementById("filterDate").value = "";
      render();
    }

    function toggleMenu(event, id) {
      event.stopPropagation();
      const el = document.getElementById(id);
      const isOpen = el.style.display === "block";
      closeAllMenus();
      if (!isOpen) el.style.display = "block";
    }

    function toggleHeaderMenu(event) {
      event.stopPropagation();
      const menu = document.getElementById("headerMenu");
      const isOpen = menu.style.display === "block";
      closeAllMenus();
      if (!isOpen) menu.style.display = "block";
    }

    function closeAllMenus() {
      document.querySelectorAll(".menu, .header-menu").forEach(m => {
        m.style.display = "none";
      });
    }

    function updateCategoryStyle() {
      const select = document.getElementById("category");
      const value = select.value;
      select.classList.remove("ORO", "RIO", "ESPRESSO", "CLASSIC", "SANTOS", "SUCRE");
      select.classList.add(value);
    }

    function setNow() {
      const now = new Date();
      const offset = now.getTimezoneOffset();
      const local = new Date(now.getTime() - offset * 60000)
        .toISOString()
        .slice(0, 16);

      document.getElementById("datetime").value = local;
    }

    function previewPrice() {
      const client = document.getElementById("clientSelect").value;
      const category = document.getElementById("category").value;
      const kilos = parseFloat(document.getElementById("kilos").value) || 0;

      const unitPrice = client ? getClientPrice(client, category) : BASE_PRICES[category];
      const totalPrice = kilos * unitPrice;

      document.getElementById("previewUnitPrice").innerText = formatDh(unitPrice);
      document.getElementById("previewTotalPrice").innerText = formatDh(totalPrice);
      document.getElementById("previewClientName").innerText = client || "—";
    }

    function formatDh(value) {
      return `${Number(value).toFixed(2)} DH`;
    }

    document.getElementById("clientSelect").addEventListener("change", previewPrice);
    document.getElementById("kilos").addEventListener("input", previewPrice);

    document.addEventListener("click", () => {
      closeAllMenus();
    });

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadClients();
    renderClients();
    render();
    updateCategoryStyle();
    previewPrice();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js")
        .then(() => console.log("Service Worker enregistré"))
        .catch((error) => console.log("Erreur Service Worker :", error));
    }
  </script>
</body>
</html>
