<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Suivi Café</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="manifest.json" />
</head>

<body style="font-family: Arial; padding: 20px;">

  <h1>☕ Suivi Café</h1>

  <input id="client" placeholder="Client"><br><br>

  <input id="kilos" type="number" placeholder="Kilos"><br><br>

  <select id="category">
    <option>ORO</option>
    <option>RIO</option>
    <option>ESPRESSO</option>
    <option>CLASSIC</option>
    <option>SANTOS</option>
    <option>SUCRE</option>
  </select><br><br>

  <button onclick="addSale()">Ajouter vente</button>

  <h2>Total kilos: <span id="total">0</span></h2>

  <hr>

  <div id="list"></div>

<script>
let sales = JSON.parse(localStorage.getItem("sales") || "[]");

function addSale() {
  const client = document.getElementById("client").value;
  const kilos = parseFloat(document.getElementById("kilos").value);
  const category = document.getElementById("category").value;

  if (!client || !kilos) return;

  sales.push({ client, kilos, category });
  localStorage.setItem("sales", JSON.stringify(sales));

  document.getElementById("client").value = "";
  document.getElementById("kilos").value = "";

  render();
}

function render() {
  let total = 0;
  const list = document.getElementById("list");
  list.innerHTML = "";

  sales.forEach(s => {
    total += s.kilos;
    list.innerHTML += `<div><b>${s.client}</b> - ${s.category} - ${s.kilos} kg</div>`;
  });

  document.getElementById("total").innerText = total;
}

render();
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
