<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TASKAFÉ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="IMG_5077.jpg">
<link rel="apple-touch-icon" href="IMG_5077.jpg">
<meta name="theme-color" content="#000000">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Arial;
  user-select:none;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('IMG_5077.jpg') center/cover no-repeat;
  opacity:0.1;
  filter:blur(2px);
  z-index:-1;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  z-index:9999;
}

#splash img{
  width:200px;
  border-radius:20px;
}

/* HEADER */
header{
  background:black;
  color:white;
  padding:15px;
  text-align:center;
  font-family:'Playfair Display';
  position:sticky;
  top:0;
}

.header-menu{
  position:absolute;
  right:10px;
  top:10px;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  margin:10px;
  border-radius:15px;
  box-shadow:0 8px 16px rgba(0,0,0,0.1);
  position:relative;
}

/* MENU */
.menu-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:none;
  border:none;
  font-size:20px;
}

.menu{
  display:none;
  position:absolute;
  right:10px;
  top:35px;
  background:white;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  border-radius:10px;
}

.menu button{
  border:none;
  padding:10px;
  width:120px;
  background:white;
}

/* BADGES */
.badge{
  padding:5px 10px;
  border-radius:10px;
  color:white;
  font-weight:bold;
}

.ORO{background:orange;}
.RIO{background:blue;}
.ESPRESSO{background:red;}
.CLASSIC{background:brown;}
.SANTOS{background:black;}
.SUCRE{background:#e6d3a3;color:black;}

.paid{color:green;font-weight:bold;}
.unpaid{color:red;font-weight:bold;}

.hidden{display:none;}

input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="splash">
  <img src="IMG_5077.jpg">
  <h2>TASKAFÉ</h2>
</div>

<header>
  TASKAFÉ
</header>

<div style="padding:10px">

<button onclick="show('sales')">Ventes</button>
<button onclick="show('clients')">Clients</button>

<div id="sales">

<select id="clientSelect"></select>

<input id="kilos" type="number" placeholder="Kilos">

<select id="category" onchange="updateCategoryStyle()">
<option>ORO</option>
<option>RIO</option>
<option>ESPRESSO</option>
<option>CLASSIC</option>
<option>SANTOS</option>
<option>SUCRE</option>
</select>

<label>📅 Choisir votre date</label>
<input type="datetime-local" id="datetime">
<button onclick="setNow()">Aujourd’hui</button>

<label><input type="checkbox" id="paid"> Payé</label>

<button onclick="addSale()">Ajouter</button>

<div id="list"></div>
</div>

<div id="clients" class="hidden">

<input id="clientName" placeholder="Nom">
<button onclick="addClient()">Ajouter client</button>

<div id="clientList"></div>

</div>

</div>

<script>
setTimeout(()=>{splash.style.display="none"},1500);

let sales=JSON.parse(localStorage.getItem("sales")||"[]");
let clients=JSON.parse(localStorage.getItem("clients")||"[]");

function save(){
localStorage.setItem("sales",JSON.stringify(sales));
localStorage.setItem("clients",JSON.stringify(clients));
}

function show(tab){
salesDiv.classList.add("hidden");
clientsDiv.classList.add("hidden");
document.getElementById(tab).classList.remove("hidden");
}

function addClient(){
let name=clientName.value;
if(!name)return alert("Nom requis");
clients.push({name});
save();
render();
}

function addSale(){
let s={
client:clientSelect.value,
kilos:kilos.value,
category:category.value,
datetime:datetime.value||new Date().toISOString(),
paid:paid.checked
};
sales.push(s);
save();
render();
}

function render(){
list.innerHTML="";
clientSelect.innerHTML="";
clientList.innerHTML="";

clients.forEach((c,i)=>{
clientSelect.innerHTML+=`<option>${c.name}</option>`;

clientList.innerHTML+=`
<div class="card">
<button class="menu-btn" onclick="toggleMenu(event,'c${i}')">⋯</button>
<div class="menu" id="c${i}">
<button onclick="deleteClient(${i})">Supprimer</button>
</div>
<b>${c.name}</b>
</div>`;
});

sales.forEach((s,i)=>{
list.innerHTML+=`
<div class="card">
<button class="menu-btn" onclick="toggleMenu(event,'s${i}')">⋯</button>
<div class="menu" id="s${i}">
<button onclick="deleteSale(${i})">Supprimer</button>
</div>
<b>${s.client}</b>
<span class="badge ${s.category}">${s.category}</span><br>
${s.kilos} kg<br>
${new Date(s.datetime).toLocaleString()}<br>
${s.paid?'<span class="paid">PAYÉ</span>':'<span class="unpaid">NON PAYÉ</span>'}
</div>`;
});
}

function deleteClient(i){
if(confirm("Supprimer client ?")){
clients.splice(i,1);
save();render();
}
}

function deleteSale(i){
if(confirm("Supprimer commande ?")){
sales.splice(i,1);
save();render();
}
}

function toggleMenu(e,id){
e.stopPropagation();
document.querySelectorAll(".menu").forEach(m=>m.style.display="none");
document.getElementById(id).style.display="block";
}

document.addEventListener("click",()=>document.querySelectorAll(".menu").forEach(m=>m.style.display="none"));

function updateCategoryStyle(){
category.className=category.value;
}

function setNow(){
let now=new Date();
let local=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
datetime.value=local;
}

/* SERVICE WORKER */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

render();
updateCategoryStyle();
</script>

</body>
</html>
