name: Validate index.html syntax

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: JS syntax check — index.html
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run syntax validation
        run: npm run validate
